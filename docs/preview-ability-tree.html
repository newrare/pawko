<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pawko — Ability Tree Preview</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:             #14040a;
  --bg-surface:     #1e080e;
  --bg-card:        #200a10;
  --crimson-muted:  #3a0e18;
  --crimson-deep:   #6a1828;
  --crimson:        #cc2840;
  --rose:           #f28090;
  --rose-dim:       #a05868;
  --rose-muted:     #6a3040;
  --gold:           #d4af37;
  --gold-light:     #f5d77a;
  --gold-dim:       #8a7040;
  --text:           #f5d77a;
  --text-sec:       #a05868;
  --text-dim:       #6a3040;
  --font:           Georgia, 'Times New Roman', serif;
}

body {
  background-color: var(--bg);
  background-image:
    radial-gradient(ellipse at 50% 100%, #2a0814 0%, transparent 65%),
    repeating-linear-gradient(
      45deg, transparent, transparent 10px,
      rgba(212,175,55,0.03) 10px, rgba(212,175,55,0.03) 20px
    );
  color: var(--text);
  font-family: var(--font);
  padding: 2rem;
  min-height: 100vh;
}

/* ─── Header ─────────────────────────────────────── */

.header {
  text-align: center;
  padding: 3rem 0 2.5rem;
  border-bottom: 1px solid var(--crimson-deep);
  margin-bottom: 3rem;
}
.header-eye {
  font-size: 0.55rem;
  letter-spacing: 6px;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 1rem;
}
.header-title {
  font-size: 3.2rem;
  color: var(--gold);
  letter-spacing: 14px;
  text-transform: uppercase;
  text-shadow: 0 0 40px rgba(212,175,55,0.22);
  margin-bottom: 0.6rem;
}
.header-tagline {
  font-size: 0.72rem;
  letter-spacing: 5px;
  text-transform: uppercase;
  color: var(--text-sec);
  margin-bottom: 1rem;
}
.header-badge {
  display: inline-block;
  padding: 3px 14px;
  border: 1px solid var(--crimson-deep);
  font-size: 0.55rem;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--text-dim);
}

/* ─── Wallet bar ──────────────────────────────────── */

.wallet-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.6rem 1.2rem;
  background: rgba(14,4,10,0.95);
  border: 1px solid var(--crimson-deep);
  border-radius: 4px;
  margin-bottom: 2rem;
}
.wallet-label {
  font-size: 0.52rem;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--text-dim);
}
.wallet-value {
  font-size: 1rem;
  color: var(--gold-light);
  font-weight: 700;
  letter-spacing: 2px;
  transition: color 0.3s;
}
.wallet-value.flash { color: var(--rose); }

/* ─── Main layout ─────────────────────────────────── */

.ability-layout {
  display: grid;
  grid-template-columns: 1fr 290px;
  gap: 2rem;
  align-items: start;
}
@media (max-width: 820px) {
  .ability-layout { grid-template-columns: 1fr; }
}

/* ─── Stacks section ──────────────────────────────── */

.section-title {
  font-size: 0.6rem;
  letter-spacing: 5px;
  text-transform: uppercase;
  color: var(--text-sec);
  padding-bottom: 0.5rem;
  border-bottom: 1px solid var(--crimson-deep);
  margin-bottom: 1.75rem;
}

.stacks-row {
  display: flex;
  gap: 1rem;
  justify-content: center;
  flex-wrap: wrap;
}

/* ─── Single stack ────────────────────────────────── */

.stack-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.9rem;
}

.stack-label {
  font-size: 0.52rem;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--text-sec);
  text-align: center;
}

.stack {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-bottom: 10px;
}

.chip-wrap {
  position: relative;
  z-index: var(--z, 1);
  cursor: pointer;
  transition: transform 0.15s;
}
.chip-wrap:not(:first-child) { margin-top: -46px; }
.chip-wrap:hover { transform: translateY(-4px); z-index: 10 !important; }
.chip-wrap.active { z-index: 11 !important; transform: translateY(-4px); }
.chip-wrap.active .chip { outline: 2px solid var(--gold); outline-offset: 4px; }

/* ─── Casino chip ─────────────────────────────────── */

.chip {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  background: conic-gradient(
    var(--c-main) 0deg 22.5deg,    var(--c-alt) 22.5deg 45deg,
    var(--c-main) 45deg 67.5deg,   var(--c-alt) 67.5deg 90deg,
    var(--c-main) 90deg 112.5deg,  var(--c-alt) 112.5deg 135deg,
    var(--c-main) 135deg 157.5deg, var(--c-alt) 157.5deg 180deg,
    var(--c-main) 180deg 202.5deg, var(--c-alt) 202.5deg 225deg,
    var(--c-main) 225deg 247.5deg, var(--c-alt) 247.5deg 270deg,
    var(--c-main) 270deg 292.5deg, var(--c-alt) 292.5deg 315deg,
    var(--c-main) 315deg 337.5deg, var(--c-alt) 337.5deg 360deg
  );
  box-shadow: 0 7px 0 rgba(0,0,0,0.55), 0 10px 20px rgba(0,0,0,0.6);
  transition: box-shadow 0.15s;
}

.chip-inner {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 28%, var(--c-face-hi), var(--c-face) 70%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.45rem;
  border: 1.5px solid rgba(255,255,255,0.08);
  box-shadow: inset 0 2px 5px rgba(255,255,255,0.07);
  position: relative;
}

/* Color variants */
.chip-crimson {
  --c-main: #4a1020; --c-alt: #b82030;
  --c-face: #140408; --c-face-hi: #260810;
  --c-glow: rgba(184,32,48,0.7);
}
.chip-gold {
  --c-main: #705828; --c-alt: #c4a030;
  --c-face: #140a00; --c-face-hi: #221400;
  --c-glow: rgba(196,160,48,0.7);
}
.chip-blue {
  --c-main: #1a2a5c; --c-alt: #3870cc;
  --c-face: #060e1e; --c-face-hi: #101c32;
  --c-glow: rgba(56,112,204,0.7);
}
.chip-ice {
  --c-main: #06607e; --c-alt: #60c4e8;
  --c-face: #021420; --c-face-hi: #062234;
  --c-glow: rgba(96,196,232,0.75);
}
.chip-epic {
  --c-main: #380e62; --c-alt: #8828dc;
  --c-face: #0c0420; --c-face-hi: #160832;
  --c-glow: rgba(136,40,220,0.7);
}

/* ─── Chip states ─────────────────────────────────── */

/* Owned */
.chip-wrap--owned .chip {
  box-shadow:
    0 7px 0 rgba(0,0,0,0.55),
    0 10px 20px rgba(0,0,0,0.6),
    0 0 0 2px rgba(212,175,55,0.45);
}
.chip-wrap--owned .chip-inner::after {
  content: '✓';
  position: absolute;
  bottom: -3px; right: -3px;
  width: 20px; height: 20px;
  background: #16a34a;
  border-radius: 50%;
  border: 2px solid var(--bg);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.65rem; font-weight: 900; color: #fff;
  line-height: 1;
}

/* Available */
.chip-wrap--available .chip {
  animation: chip-pulse 2.2s ease-in-out infinite;
}
.chip-wrap--available .chip-inner::after {
  content: '!';
  position: absolute;
  bottom: -3px; right: -3px;
  width: 20px; height: 20px;
  background: var(--gold);
  border-radius: 50%;
  border: 2px solid var(--bg);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.75rem; font-weight: 900; color: #000;
  line-height: 1;
}

/* Locked */
.chip-wrap--locked .chip { filter: grayscale(75%) brightness(0.3); }
.chip-wrap--locked .chip-inner::after {
  content: '🔒';
  position: absolute;
  bottom: -3px; right: -5px;
  font-size: 0.7rem;
  filter: grayscale(1) brightness(0.5);
}

/* ─── Legend ──────────────────────────────────────── */

.legend-bar {
  display: flex;
  gap: 1.5rem;
  justify-content: center;
  margin-top: 1.5rem;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  font-size: 0.58rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-sec);
}
.legend-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
}
.legend-dot--owned    { background: #16a34a; }
.legend-dot--available { background: var(--gold); box-shadow: 0 0 6px var(--gold); }
.legend-dot--locked   { background: var(--text-dim); }

/* ─── Detail panel ────────────────────────────────── */

.detail-panel {
  position: sticky;
  top: 1.5rem;
  background: var(--bg-card);
  border: 1px solid var(--crimson-deep);
  border-radius: 4px;
  overflow: hidden;
}

.detail-empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 380px;
  gap: 0.75rem;
  opacity: 0.3;
  text-align: center;
  padding: 2rem;
}
.detail-empty-icon { font-size: 2.8rem; }
.detail-empty-text {
  font-size: 0.65rem;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--text-sec);
  line-height: 1.8;
}

.detail-content { padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; }

.detail-top {
  display: flex;
  gap: 1rem;
  align-items: flex-start;
  padding-bottom: 1rem;
  border-bottom: 1px solid var(--crimson-muted);
}
.detail-chip-preview { flex-shrink: 0; pointer-events: none; }
.detail-meta { flex: 1; }
.detail-name {
  font-size: 0.95rem;
  color: var(--gold-light);
  letter-spacing: 2px;
  margin-bottom: 0.3rem;
}
.detail-category {
  font-size: 0.5rem;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--text-sec);
  margin-bottom: 0.6rem;
}
.detail-badge {
  display: inline-flex;
  align-items: center;
  gap: 0.3rem;
  padding: 2px 9px;
  border-radius: 2px;
  font-size: 0.5rem;
  letter-spacing: 3px;
  text-transform: uppercase;
  font-weight: 700;
}
.detail-badge--owned    { background: rgba(22,163,74,0.15); color: #86efac; border: 1px solid rgba(22,163,74,0.3); }
.detail-badge--available { background: rgba(212,175,55,0.12); color: var(--gold); border: 1px solid rgba(212,175,55,0.3); }
.detail-badge--locked   { background: rgba(106,24,40,0.3); color: var(--text-dim); border: 1px solid var(--crimson-muted); }

.detail-desc {
  font-size: 0.78rem;
  color: var(--text-sec);
  line-height: 1.65;
}

.detail-cost-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.65rem 1rem;
  background: rgba(0,0,0,0.2);
  border: 1px solid var(--crimson-muted);
  border-radius: 3px;
}
.detail-cost-label { font-size: 0.5rem; letter-spacing: 3px; text-transform: uppercase; color: var(--text-dim); }
.detail-cost-value { font-size: 1rem; color: var(--gold-light); font-weight: 700; }
.detail-cost-value.free { color: #86efac; font-size: 0.72rem; letter-spacing: 2px; }

.detail-prereq {
  padding: 0.6rem 0.85rem;
  background: rgba(106,24,40,0.15);
  border: 1px solid var(--crimson-muted);
  border-left: 3px solid var(--crimson-deep);
  border-radius: 2px;
}
.detail-prereq-label {
  font-size: 0.48rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 0.25rem;
}
.detail-prereq-value { font-size: 0.72rem; color: var(--text-sec); }

.btn {
  padding: 0.55rem 1.2rem;
  border: none;
  cursor: pointer;
  font-family: var(--font);
  font-size: 0.72rem;
  letter-spacing: 3px;
  text-transform: uppercase;
  border-radius: 0;
  transition: filter 0.1s;
  width: 100%;
  text-align: center;
}
.btn:hover  { filter: brightness(1.12); }
.btn:active { filter: brightness(0.9); }
.btn-buy    { background: var(--crimson-deep); color: var(--gold-light); border: 1px solid var(--gold); }
.btn-owned  { background: rgba(22,163,74,0.15); color: #86efac; border: 1px solid rgba(22,163,74,0.3); cursor: default; }
.btn-locked { background: var(--crimson-muted); color: var(--text-dim); border: 1px solid var(--rose-muted); opacity: 0.4; cursor: default; pointer-events: none; }
.btn-broke  { background: rgba(106,24,40,0.4); color: #ff8080; border: 1px solid #7a1515; cursor: default; pointer-events: none; font-size: 0.62rem; }

/* ─── Animations ──────────────────────────────────── */

@keyframes chip-pulse {
  0%, 100% { box-shadow: 0 7px 0 rgba(0,0,0,0.55), 0 10px 20px rgba(0,0,0,0.6), 0 0 8px  var(--c-glow); }
  50%       { box-shadow: 0 7px 0 rgba(0,0,0,0.55), 0 10px 20px rgba(0,0,0,0.6), 0 0 22px var(--c-glow), 0 0 40px var(--c-glow); }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-eye">UI Preview · Ability Tree</div>
  <div class="header-title">PAWKO</div>
  <div class="header-tagline">Chip Stacks · Unlock Powers</div>
  <div class="header-badge">v0.1.0 · Concept</div>
</div>

<div class="ability-layout">

  <!-- ── Left: stacks ── -->
  <div>
    <div class="section-title">01 · Ability Stacks</div>
    <div class="wallet-bar">
      <span class="wallet-label">Coins Available</span>
      <span class="wallet-value" id="coin-display">🪙 180</span>
    </div>
    <div class="stacks-row" id="stacks-container"></div>
    <div class="legend-bar">
      <div class="legend-item"><span class="legend-dot legend-dot--owned"></span>Owned</div>
      <div class="legend-item"><span class="legend-dot legend-dot--available"></span>Available</div>
      <div class="legend-item"><span class="legend-dot legend-dot--locked"></span>Locked</div>
    </div>
  </div>

  <!-- ── Right: detail panel ── -->
  <aside class="detail-panel" id="detail-panel">
    <div class="detail-empty" id="detail-empty">
      <div class="detail-empty-icon">🎰</div>
      <div class="detail-empty-text">Select a chip<br>to see details</div>
    </div>
    <div class="detail-content" id="detail-content" style="display:none"></div>
  </aside>

</div>

<script>
let coins = 180;
let selectedId = null;

const stacks = [
  {
    id: 'ball', name: 'Ball', color: 'crimson',
    chips: [
      { id: 'ball-1', name: 'Extra Ball',    icon: '🎱', desc: 'Start each round with 6 balls per launcher instead of 5. Compounds with other ball bonuses.', cost: 50,  state: 'owned',     prereq: null },
      { id: 'ball-2', name: 'Double Drop',   icon: '🎯', desc: 'Fire 2 balls simultaneously from each launcher. Your save zone fills twice as fast.',          cost: 120, state: 'available', prereq: 'Extra Ball' },
      { id: 'ball-3', name: 'Triple Force',  icon: '💣', desc: 'Launch 3 balls at once from every launcher. More chaos, far more hits per level.',              cost: 250, state: 'locked',    prereq: 'Double Drop' },
      { id: 'ball-4', name: 'Storm',         icon: '⚡', desc: 'Once per level, trigger a storm: 10 extra balls cascade from each launcher in rapid succession.', cost: 500, state: 'locked',    prereq: 'Triple Force' },
    ]
  },
  {
    id: 'score', name: 'Score', color: 'gold',
    chips: [
      { id: 'score-1', name: 'Score ×1.5',  icon: '✨', desc: 'Permanently multiply your base score by 1.5×. Every peg hit and gate reward is boosted.',         cost: 60,  state: 'available', prereq: null },
      { id: 'score-2', name: 'Score ×2',    icon: '💫', desc: 'Double your multiplier. Stacks with ×1.5 for a ×3 effective multiplier.',                          cost: 140, state: 'locked',    prereq: 'Score ×1.5' },
      { id: 'score-3', name: 'Hot Streak',  icon: '🔥', desc: 'Score multiplier grows +0.1× for each consecutive peg hit. Resets at the start of each level.',    cost: 300, state: 'locked',    prereq: 'Score ×2' },
      { id: 'score-4', name: 'Jackpot',     icon: '🎰', desc: '5% chance per level to activate — the whole level\'s score is multiplied by ×10. Pure luck.',      cost: 600, state: 'locked',    prereq: 'Hot Streak' },
    ]
  },
  {
    id: 'physics', name: 'Physics', color: 'blue',
    chips: [
      { id: 'phys-1', name: 'Bounce+',       icon: '🏓', desc: '+20% restitution coefficient. Balls bounce further and higher, reaching more pegs per drop.',      cost: 70,  state: 'available', prereq: null },
      { id: 'phys-2', name: 'Speed Burst',   icon: '💨', desc: 'Balls move 40% faster throughout the level. More kinetic energy — more hits per second.',          cost: 150, state: 'locked',    prereq: 'Bounce+' },
      { id: 'phys-3', name: 'Gravity Shift', icon: '🌐', desc: 'Halve gravity for 3 levels. Balls travel in wide arcs, reaching pegs normally out of range.',      cost: 280, state: 'locked',    prereq: 'Speed Burst' },
      { id: 'phys-4', name: 'Chaos Mode',    icon: '🎲', desc: 'Physics randomize every level — mass, gravity, bounce all vary. Unpredictable but spectacular.',   cost: 550, state: 'locked',    prereq: 'Gravity Shift' },
    ]
  },
  {
    id: 'freeze', name: 'Freeze', color: 'ice',
    chips: [
      { id: 'ice-1', name: 'Ice Ball',    icon: '🧊', desc: 'One ball becomes icy. It freezes every peg it touches — frozen pegs are inactive until thawed.',       cost: 0,   state: 'owned',     prereq: null },
      { id: 'ice-2', name: 'Cryo Burst', icon: '💎', desc: 'Ice ball freezes all pegs within 30 px of each impact point, not just the one it directly hits.',        cost: 100, state: 'available', prereq: 'Ice Ball' },
      { id: 'ice-3', name: 'Blizzard',   icon: '🌨', desc: 'All balls become ice balls for 5 levels. The entire board gradually freezes over.',                     cost: 220, state: 'locked',    prereq: 'Cryo Burst' },
      { id: 'ice-4', name: 'Permafrost', icon: '🏔', desc: 'Frozen pegs stay frozen for 2 extra ball passes instead of 1. Longer board control.',                    cost: 450, state: 'locked',    prereq: 'Blizzard' },
    ]
  },
  {
    id: 'fortune', name: 'Fortune', color: 'epic',
    chips: [
      { id: 'luck-1', name: 'Shop Finder',    icon: '🛒', desc: '+1 shop peg added to every new level layout. More mid-run upgrade opportunities.',                 cost: 90,  state: 'available', prereq: null },
      { id: 'luck-2', name: 'Coin Magnet',    icon: '🧲', desc: 'Ball trajectories subtly curve toward coin pegs within 40 px. Earn more coins per run.',           cost: 180, state: 'locked',    prereq: 'Shop Finder' },
      { id: 'luck-3', name: 'Fortune',        icon: '🪙', desc: '+50% coins earned from all sources: coin pegs, collection gates, and level-end bonuses.',           cost: 320, state: 'locked',    prereq: 'Coin Magnet' },
      { id: 'luck-4', name: 'Golden Touch',   icon: '👑', desc: 'Once per level, briefly convert all active pegs to coin pegs. A golden waterfall of earnings.',    cost: 650, state: 'locked',    prereq: 'Fortune' },
    ]
  },
];

/* ─── Helpers ─────────────────────────────────────── */

function findChip(id) {
  for (const s of stacks) {
    const c = s.chips.find(c => c.id === id);
    if (c) return { chip: c, stack: s };
  }
  return null;
}

function updateCoinsDisplay() {
  const el = document.getElementById('coin-display');
  el.textContent = '🪙 ' + coins;
}

/* ─── Render ──────────────────────────────────────── */

function buildChipEl(chip, stack, zIndex) {
  const wrap = document.createElement('div');
  wrap.className = `chip-wrap chip-wrap--${chip.state}`;
  wrap.style.setProperty('--z', zIndex);
  wrap.dataset.chipId = chip.id;

  const chipEl = document.createElement('div');
  chipEl.className = `chip chip-${stack.color}`;

  const inner = document.createElement('div');
  inner.className = 'chip-inner';
  inner.textContent = chip.icon;

  chipEl.appendChild(inner);
  wrap.appendChild(chipEl);
  wrap.addEventListener('click', () => selectChip(chip.id));
  return wrap;
}

function renderStacks() {
  const container = document.getElementById('stacks-container');
  container.innerHTML = '';

  for (const stack of stacks) {
    const wrap = document.createElement('div');
    wrap.className = 'stack-wrap';

    const stackEl = document.createElement('div');
    stackEl.className = 'stack';
    stackEl.id = 'stack-' + stack.id;

    const total = stack.chips.length;
    stack.chips.forEach((chip, i) => {
      stackEl.appendChild(buildChipEl(chip, stack, total - i));
    });

    const label = document.createElement('div');
    label.className = 'stack-label';
    label.textContent = stack.name;

    wrap.appendChild(stackEl);
    wrap.appendChild(label);
    container.appendChild(wrap);
  }
}

/* ─── Detail panel ────────────────────────────────── */

function selectChip(id) {
  selectedId = id;

  document.querySelectorAll('.chip-wrap').forEach(el => {
    el.classList.toggle('active', el.dataset.chipId === id);
  });

  const { chip, stack } = findChip(id);
  const emptyEl   = document.getElementById('detail-empty');
  const contentEl = document.getElementById('detail-content');

  emptyEl.style.display = 'none';
  contentEl.style.display = 'flex';
  contentEl.innerHTML = renderDetailHTML(chip, stack);

  const buyBtn = document.getElementById('btn-action');
  if (buyBtn) buyBtn.addEventListener('click', () => buyChip(id));
}

function renderDetailHTML(chip, stack) {
  const stateLabel = { owned: 'Owned', available: 'Available', locked: 'Locked' }[chip.state];
  const badgeClass = `detail-badge detail-badge--${chip.state}`;

  const costHTML = chip.state === 'owned'
    ? `<span class="detail-cost-value free">Unlocked</span>`
    : chip.cost === 0
      ? `<span class="detail-cost-value free">Free</span>`
      : `<span class="detail-cost-value">🪙 ${chip.cost}</span>`;

  const prereqHTML = chip.prereq
    ? `<div class="detail-prereq">
         <div class="detail-prereq-label">Requires</div>
         <div class="detail-prereq-value">${chip.prereq}</div>
       </div>`
    : '';

  let btnHTML = '';
  if (chip.state === 'owned') {
    btnHTML = `<button class="btn btn-owned" disabled>✓ Already Owned</button>`;
  } else if (chip.state === 'locked') {
    btnHTML = `<button class="btn btn-locked" disabled>🔒 Locked</button>`;
  } else if (chip.cost === 0) {
    btnHTML = `<button class="btn btn-buy" id="btn-action">Unlock Free</button>`;
  } else if (coins >= chip.cost) {
    btnHTML = `<button class="btn btn-buy" id="btn-action">Buy — 🪙 ${chip.cost}</button>`;
  } else {
    btnHTML = `<button class="btn btn-broke" disabled>Not Enough Coins (${coins} / ${chip.cost})</button>`;
  }

  return `
    <div class="detail-top">
      <div class="detail-chip-preview">
        <div class="chip chip-${stack.color}" style="width:56px;height:56px;cursor:default;">
          <div class="chip-inner" style="width:38px;height:38px;font-size:1.1rem;">${chip.icon}</div>
        </div>
      </div>
      <div class="detail-meta">
        <div class="detail-name">${chip.name}</div>
        <div class="detail-category">${stack.name} Path</div>
        <span class="${badgeClass}">${stateLabel}</span>
      </div>
    </div>
    <div class="detail-desc">${chip.desc}</div>
    ${prereqHTML}
    <div class="detail-cost-row">
      <span class="detail-cost-label">Cost</span>
      ${costHTML}
    </div>
    ${btnHTML}
  `;
}

/* ─── Buy logic ───────────────────────────────────── */

function buyChip(id) {
  const { chip, stack } = findChip(id);
  if (chip.state !== 'available') return;
  if (chip.cost > coins) return;

  coins -= chip.cost;
  chip.state = 'owned';
  updateCoinsDisplay();

  const idx = stack.chips.indexOf(chip);
  if (idx + 1 < stack.chips.length) {
    stack.chips[idx + 1].state = 'available';
  }

  renderStacks();
  selectChip(id);
}

/* ─── Init ────────────────────────────────────────── */

renderStacks();
updateCoinsDisplay();
</script>
</body>
</html>
